name: OpenSnekMac
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  OpenSnekMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekMac
    resources:
      - path: App/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.opensnek.OpenSnekMac
        PRODUCT_NAME: OpenSnekMac
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SUPPORTS_MACCATALYST: NO
    scheme:
      gatherCoverageData: false
      testTargets:
        - OpenSnekMacTests

  OpenSnekProbe:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekProbe
    settings:
      base:
        PRODUCT_NAME: OpenSnekProbe
        GENERATE_INFOPLIST_FILE: YES
        OTHER_SWIFT_FLAGS:
          - -parse-as-library
    scheme:
      gatherCoverageData: false

  OpenSnekMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OpenSnekMacTests
    dependencies:
      - target: OpenSnekMac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.opensnek.OpenSnekMacTests
