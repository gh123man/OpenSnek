name: OpenSnek
options:
  minimumXcodeGenVersion: 2.45.3
  deploymentTarget:
    macOS: "14.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  OpenSnekCore:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekCore
    settings:
      base:
        PRODUCT_NAME: OpenSnekCore
        DEFINES_MODULE: YES

  OpenSnekProtocols:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekProtocols
    dependencies:
      - target: OpenSnekCore
    settings:
      base:
        PRODUCT_NAME: OpenSnekProtocols
        DEFINES_MODULE: YES

  OpenSnekHardware:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekHardware
    dependencies:
      - target: OpenSnekCore
      - target: OpenSnekProtocols
    settings:
      base:
        PRODUCT_NAME: OpenSnekHardware
        DEFINES_MODULE: YES

  OpenSnekAppSupport:
    type: library.static
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekAppSupport
    dependencies:
      - target: OpenSnekCore
      - target: OpenSnekHardware
    settings:
      base:
        PRODUCT_NAME: OpenSnekAppSupport
        DEFINES_MODULE: YES

  OpenSnek:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnek
      - path: App/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.opensnek.OpenSnek
        PRODUCT_NAME: OpenSnek
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          OPEN_SNEK_BUILD_CHANNEL: dev
        Release:
          OPEN_SNEK_BUILD_CHANNEL: release
    dependencies:
      - target: OpenSnekCore
      - target: OpenSnekProtocols
      - target: OpenSnekHardware
      - target: OpenSnekAppSupport
    scheme:
      gatherCoverageData: false
      testTargets:
        - OpenSnekTests

  OpenSnekProbe:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/OpenSnekProbe
    settings:
      base:
        PRODUCT_NAME: OpenSnekProbe
        GENERATE_INFOPLIST_FILE: YES
        OTHER_SWIFT_FLAGS:
          - -parse-as-library
    dependencies:
      - target: OpenSnekCore
      - target: OpenSnekProtocols
      - target: OpenSnekHardware
    scheme:
      gatherCoverageData: false

  OpenSnekTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/OpenSnekTests
    dependencies:
      - target: OpenSnekCore
      - target: OpenSnekProtocols
      - target: OpenSnekHardware
      - target: OpenSnekAppSupport
      - target: OpenSnek
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: io.opensnek.OpenSnekTests
