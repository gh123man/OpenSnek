name: Pull Request Tests

on:
  pull_request:
    branches:
      - main

jobs:
  swift-unit-tests:
    name: Swift Unit Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcodegen --version

      - name: Verify generated Xcode project is in sync
        run: ./OpenSnek/scripts/check_xcodeproj_sync.sh

      - name: Run Swift package tests
        env:
          OPEN_SNEK_HW: "0"
        run: swift test --package-path OpenSnek
